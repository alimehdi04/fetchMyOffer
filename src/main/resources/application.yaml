spring:
  application:
    name: fetchMyOffer

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vector_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  ai:
    chat:
      client:
        enabled: false

    # 1. THE REASONING ENGINE (Groq)
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.2

    # 2. THE VECTOR & CHAT ENGINE (Google Gemini)
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          enabled: true

    # 3. THE MEMORY VAULT (pgvector)
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        initialize-schema: true
        remove-existing-vector-store-table: false

# 🛑 SECURED: Telegram Bot Configuration
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    chat-id: ${TELEGRAM_CHAT_ID}

# Job Hunt Scheduler (Runs at 9:00 AM every day by default)
job:
  hunt:
    cron: 0 0 9 * * ?

# Cloud Python Scraper URL
scraper:
  python:
    url: https://scraper-fetchmyoffer.onrender.com/api/v1/scrape

# Cloud Webhook URL
webhook:
  callback:
    url: ${WEBHOOK_URL:http://localhost:8080/api/v1/webhooks/scrape-results}